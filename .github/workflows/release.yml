name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/toptimer" dist/toptimer
          tar -C dist -czf "dist/toptimer-${{ matrix.target }}.tar.gz" toptimer
          shasum -a 256 "dist/toptimer-${{ matrix.target }}.tar.gz" > "dist/SHA256SUMS-${{ matrix.target }}"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/toptimer.exe" "dist/toptimer.exe"
          Compress-Archive -Path "dist/toptimer.exe" -DestinationPath "dist/toptimer-${{ matrix.target }}.zip" -Force
          $hash = (Get-FileHash "dist/toptimer-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  dist/toptimer-${{ matrix.target }}.zip" | Out-File -FilePath "dist/SHA256SUMS-${{ matrix.target }}" -Encoding ascii

      - name: Upload artifact archive
        uses: actions/upload-artifact@v4
        with:
          name: toptimer-${{ matrix.target }}
          path: dist/toptimer-${{ matrix.target }}.${{ matrix.archive_ext }}

      - name: Upload checksum fragment
        uses: actions/upload-artifact@v4
        with:
          name: sha256-${{ matrix.target }}
          path: dist/SHA256SUMS-${{ matrix.target }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: toptimer-*
          path: release-assets
          merge-multiple: true

      - name: Download checksum fragments
        uses: actions/download-artifact@v4
        with:
          pattern: sha256-*
          path: checksums
          merge-multiple: true

      - name: Build final checksum file
        shell: bash
        run: |
          cat checksums/SHA256SUMS-* > release-assets/SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/toptimer-*.tar.gz
            release-assets/toptimer-*.zip
            release-assets/SHA256SUMS
